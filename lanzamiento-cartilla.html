<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lanzamiento cartilla</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f7f4fb;
      color: #2f1f3b;
      padding: 30px 20px;
    }

    .container {
      width: 90%;
      max-width: 1100px;
      margin: 0 auto;
    }

    .encabezado {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(106, 44, 145, 0.08);
      margin-bottom: 25px;
    }

    h1 {
      color: #6a2c91;
      margin-bottom: 10px;
    }

    p {
      line-height: 1.6;
    }

    .galeria-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .galeria-grid img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(106, 44, 145, 0.10);
      transition: transform 0.2s ease;
      background: white;
    }

    .galeria-grid img:hover {
      transform: scale(1.02);
    }

    .volver {
      display: inline-block;
      margin-top: 25px;
      text-decoration: none;
      background: #6f3c97;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 600;
    }

    .volver:hover {
      background: #5d2f81;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="encabezado">
      <h1>Lanzamiento cartilla</h1>
      <p>Registro fotográfico del evento.</p>
    </div>

    <div class="galeria-grid">
      <img src="img/cartilla/cartilla1.jpg" alt="Lanzamiento cartilla - Foto 1">
      <img src="img/cartilla/cartilla2.jpeg" alt="Lanzamiento cartilla - Foto 2">
      <img src="img/cartilla/cartilla3.jpeg" alt="Lanzamiento cartilla - Foto 3">
    </div>

    <a href="index.html" class="volver">← Volver al sitio principal</a>
  </div>
</body>
</html>
